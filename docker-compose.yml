version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16
    container_name: lifeos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lifeos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lifeos123}
      POSTGRES_DB: ${POSTGRES_DB:-lifeos}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifeos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Server
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: lifeos-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://lifeos:lifeos123@db:5432/lifeos}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      LOKI_URL: ${LOKI_URL:-http://loki:3100}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MOCK_AUTH: ${MOCK_AUTH:-false}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      loki:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Web Application
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: lifeos-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Loki Log Aggregator
  loki:
    image: grafana/loki:latest
    container_name: lifeos-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: lifeos-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki

volumes:
  db-data:
  grafana-data:

networks:
  default:
    name: lifeos-network